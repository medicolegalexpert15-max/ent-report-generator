<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report Generator</title>

<style>
body{
font-family:Arial;
background:#f2f4f8;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
margin:auto;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

select,input,textarea{
width:100%;
padding:8px;
margin-top:5px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#report{
background:#fafafa;
padding:20px;
margin-top:20px;
border-radius:8px;
white-space:pre-line;
}

</style>
</head>

<body>

<div class="container">

<h1>Custom Report Generator</h1>

<label>Patient Name</label>
<input id="name">

<label>Date of Incident</label>
<input type="date" id="date">

<label>Role in Accident</label>
<select id="role">
<option value="">Select</option>
<option>Driver</option>
<option>Passenger</option>
<option>Pedestrian</option>
<option>Cyclist</option>
<option>Motorbike rider</option>
<option>Taxi passenger</option>
</select>

 <label>Vehicle1</label>
<select id="vehicle1">
<option value="">Select</option>
<option>car</option>
<option>van</option>
<option>lorry</option>
<option>truck</option>
<option>Motorbike</option>
<option>e-bike</option>
</select> 

<label>Gender</label>
<select id="gender">
<option value="">Select</option>
<option>his</option>
<option>her</option>
</select>

<label>Weather</label>
<select id="weather">
<option value="">Select</option>
<option>dry and sunny</option>
<option>dry but cloudy</option> 
<option>raining</option>
</select>
  
<label>Road surface</label>
<select id="roads">
<option value="">Select</option>
<option>dry</option>
<option>wet</option>
</select>
  
<label>TIme of the Day</label>
<select id="daytime">
<option value="">Select</option>
<option>morning</option>
<option>afternoon</option> 
<option>evening</option>
<option>night</option>
<option>mid night</option>
<option>early morning</option>
</select>

<label>Mechanism of Injury</label>
<select id="mechanism">
<option value="">Select</option>
<option>Rear-end collision</option>
<option>Head-on collision</option>
<option>Side impact - left</option>
<option>Side impact - right</option>  
<option>Vehicle stationary and struck</option>
<option>seat belts fastened</option>
<option>Seat belts not fastened</option>
<option>Head / body jolted</option>
<option>Head / body not jolted</option>
<option>Head hit sterring wheel / head rest</option>
<option>Head hit the side pillar</option>
</select>

<label>Symptoms</label>
<textarea id="symptoms"></textarea>

<button onclick="generateReport()">Generate Report</button>

<div id="report"></div>

</div>

<script>

function generateReport(){

let name = document.getElementById("name").value
let date = document.getElementById("date").value
let role = document.getElementById("role").value
let mechanism = document.getElementById("mechanism").value
let symptoms = document.getElementById("symptoms").value

// ✅ ADD THESE
let daytime = document.getElementById("daytime").value
let weather = document.getElementById("weather").value
let roads = document.getElementById("roads").value

// (optional: remove vision & movement OR define them later)

let report = `

ACCIDENT DETAILS

According to the history provided, ${name} was involved in a road traffic accident on ${date}. 
On the day of the accident, in the ${daytime}, which was ${weather}, with a ${roads} road surface, the claimant was travelling as a ${role} of ${Gender}${vehicle1}. 
The claimant's vehicle was involved in the following mechanism: ${mechanism}.

CLINICAL SYMPTOMS

Following the accident the claimant reported the following symptoms: ${symptoms}.

`

document.getElementById("report").innerText = report

}

</script>

</body>
</html>
